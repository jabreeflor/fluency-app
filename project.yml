name: Fluency
options:
  bundleIdPrefix: com.fluency
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_PREVIEWS: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Fluency:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Fluency
        excludes:
          - Resources/Content/**
    resources:
      - path: Fluency/Resources/Assets.xcassets
      - path: Fluency/Resources/Content
        buildPhase: resources
    info:
      path: Fluency/Info.plist
      properties:
        CFBundleName: Fluency
        CFBundleDisplayName: Fluency
        CFBundleIdentifier: com.fluency.app
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: "Fluency uses your microphone for speaking exercises."
        NSSpeechRecognitionUsageDescription: "Fluency uses speech recognition to check your pronunciation."
    entitlements:
      path: Fluency/Fluency.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fluency.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Fluency/Info.plist
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
